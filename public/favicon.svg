<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Soft sage/mint radial gradient background, matching app-icon references -->
    <radialGradient id="bg" cx="50%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#eef7dc"/>
      <stop offset="55%" stop-color="#c7e4be"/>
      <stop offset="100%" stop-color="#9dc99a"/>
    </radialGradient>

    <!-- Porcini cap: rich brown with mahogany depth -->
    <linearGradient id="cap" x1="25%" y1="0%" x2="75%" y2="100%">
      <stop offset="0%" stop-color="#9c6432"/>
      <stop offset="45%" stop-color="#74451f"/>
      <stop offset="100%" stop-color="#3e2010"/>
    </linearGradient>

    <!-- Cap glossy top highlight -->
    <linearGradient id="capHl" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#ffd9a6" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#ffd9a6" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ffd9a6" stop-opacity="0"/>
    </linearGradient>

    <!-- Stem: cream/beige with side shading -->
    <linearGradient id="stem" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a08c65"/>
      <stop offset="25%" stop-color="#f2e6c8"/>
      <stop offset="55%" stop-color="#e5d5ac"/>
      <stop offset="100%" stop-color="#8d7850"/>
    </linearGradient>

    <!-- Moss cushion -->
    <linearGradient id="moss" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#78c256"/>
      <stop offset="100%" stop-color="#2f7a30"/>
    </linearGradient>

    <!-- Scan trail: translucent green fading downward -->
    <linearGradient id="scanTrail" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#1b5e20" stop-opacity="0.38"/>
      <stop offset="55%" stop-color="#1b5e20" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#1b5e20" stop-opacity="0"/>
    </linearGradient>

    <!-- Scan beam gloss: horizontal highlight that makes the bar feel 3D -->
    <linearGradient id="scanBeam" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#2e7d32"/>
      <stop offset="45%" stop-color="#1b5e20"/>
      <stop offset="100%" stop-color="#0f3d15"/>
    </linearGradient>

    <!-- Soft drop shadow for the mushroom -->
    <filter id="mshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5"/>
      <feOffset dx="0" dy="7"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.28"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Soft glow for the scan beam -->
    <filter id="beamGlow" x="-10%" y="-200%" width="120%" height="500%">
      <feGaussianBlur stdDeviation="3"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded-square app-icon background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Scanner bracket frame (4 L-corners) -->
  <g stroke="#1b5e20" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M 84 152 L 84 84 L 152 84"/>
    <path d="M 360 84 L 428 84 L 428 152"/>
    <path d="M 84 360 L 84 428 L 152 428"/>
    <path d="M 360 428 L 428 428 L 428 360"/>
  </g>

  <!-- Mushroom group -->
  <g filter="url(#mshadow)">
    <!-- Stem: bulbous porcini shape, wider at base -->
    <path d="M 204 278
             Q 190 340, 200 394
             Q 228 408, 256 408
             Q 284 408, 312 394
             Q 322 340, 308 278
             Q 283 268, 256 266
             Q 229 268, 204 278 Z"
          fill="url(#stem)"/>

    <!-- Cap: wide dome, slight overhang -->
    <path d="M 142 236
             Q 142 132, 256 132
             Q 370 132, 370 236
             Q 370 278, 340 288
             Q 256 298, 172 288
             Q 142 278, 142 236 Z"
          fill="url(#cap)"/>

    <!-- Cap top glossy highlight -->
    <path d="M 176 196
             Q 200 150, 260 150
             Q 315 150, 335 175
             Q 300 160, 256 160
             Q 210 160, 176 196 Z"
          fill="url(#capHl)"/>

    <!-- Cap under-rim subtle shadow -->
    <ellipse cx="256" cy="286" rx="114" ry="9" fill="rgba(0,0,0,0.18)"/>
  </g>

  <!-- ========== Scanner beam + fade trail ========== -->
  <!-- Trail: semi-transparent green wash fading downward through the stem -->
  <rect x="88" y="286" width="336" height="122" fill="url(#scanTrail)" rx="4"/>

  <!-- Scan beam (the glossy 3D bar) with glow -->
  <g filter="url(#beamGlow)">
    <!-- Main beam body -->
    <rect x="88" y="282" width="336" height="8" rx="4" fill="url(#scanBeam)"/>
    <!-- Top glossy highlight line on the beam -->
    <rect x="96" y="283" width="320" height="1.5" rx="0.75" fill="#a8e6a2" opacity="0.85"/>
    <!-- Sparkle at beam center for extra pop -->
    <circle cx="256" cy="286" r="3.5" fill="#d4f5cf" opacity="0.95"/>
  </g>

  <!-- Moss cushion base (painted on top of the scan trail) -->
  <g>
    <!-- Back moss bed -->
    <ellipse cx="256" cy="410" rx="120" ry="20" fill="url(#moss)" opacity="0.85"/>
    <!-- Moss clumps for texture -->
    <circle cx="158" cy="412" r="11" fill="url(#moss)"/>
    <circle cx="180" cy="406" r="14" fill="url(#moss)"/>
    <circle cx="208" cy="398" r="16" fill="url(#moss)"/>
    <circle cx="238" cy="402" r="13" fill="url(#moss)"/>
    <circle cx="270" cy="398" r="15" fill="url(#moss)"/>
    <circle cx="300" cy="401" r="14" fill="url(#moss)"/>
    <circle cx="330" cy="407" r="13" fill="url(#moss)"/>
    <circle cx="352" cy="413" r="11" fill="url(#moss)"/>
    <!-- Moss highlights -->
    <circle cx="206" cy="393" r="5" fill="#a3e07d" opacity="0.75"/>
    <circle cx="268" cy="391" r="5" fill="#a3e07d" opacity="0.75"/>
    <circle cx="327" cy="400" r="4" fill="#a3e07d" opacity="0.6"/>
  </g>
</svg>
