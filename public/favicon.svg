<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <g transform="translate(256,240)" fill="white">
    <!-- Mushroom cap -->
    <ellipse cx="0" cy="-40" rx="120" ry="80" fill="white" opacity="0.95"/>
    <!-- Cap top highlight -->
    <ellipse cx="0" cy="-60" rx="80" ry="40" fill="white" opacity="0.3"/>
    <!-- Stem -->
    <rect x="-30" y="20" width="60" height="100" rx="15" fill="white" opacity="0.9"/>
    <!-- Cap dots -->
    <circle cx="-50" cy="-50" r="12" fill="#10b981" opacity="0.4"/>
    <circle cx="30" cy="-65" r="10" fill="#10b981" opacity="0.3"/>
    <circle cx="-15" cy="-80" r="8" fill="#10b981" opacity="0.35"/>
    <circle cx="60" cy="-35" r="9" fill="#10b981" opacity="0.3"/>
  </g>
  <!-- M letter -->
  <text x="256" y="430" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="80" fill="white" opacity="0.9">MI</text>
</svg>
